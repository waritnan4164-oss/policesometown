<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Some Town</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #07080b; color: #e6eef8; }
        .card { background: linear-gradient(180deg,#0b1220,#071021); border: 1px solid #1e3a8a; padding: 28px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); width: 380px; }
        input { background: #071126; border: 1px solid #1f2937; color: #dbeafe; padding: 10px 12px; border-radius: 8px; width: 100%; }
        .btn { background: linear-gradient(90deg,#3b82f6,#06b6d4); color: white; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; }
        .logo { width: 160px; height: auto; margin-bottom: 10px; }
        a.link-back { color: #9ee7ff; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="card text-center">
        <img src="1000018386.png" alt="Logo" class="logo mx-auto">
        <h1 class="text-2xl font-bold mb-3">เข้าสู่ระบบ</h1>
        <p class="text-sm text-slate-400 mb-4">กรุณาใส่ชื่อผู้ใช้และรหัสผ่าน</p>

        <form id="loginForm">
            <div class="mb-3 text-left">
                <label class="text-xs text-slate-300">ชื่อผู้ใช้</label>
                <input id="username" name="username" type="text" placeholder="ชื่อผู้ใช้" autocomplete="username">
            </div>
            <div class="mb-4 text-left">
                <label class="text-xs text-slate-300">รหัสผ่าน</label>
                <input id="password" name="password" type="password" placeholder="รหัสผ่าน" autocomplete="current-password">
            </div>
            <div class="mb-4">
                <button type="submit" class="btn w-full">🔓 เข้าสู่ระบบ</button>
            </div>
        </form>

        <div class="text-xs text-slate-400">
            <a href="index.html" class="link-back">← กลับไปยังหน้าแรก</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if (!u || !p) {
                alert('โปรดกรอกชื่อผู้ใช้และรหัสผ่าน');
                return;
            }
            // แบบง่าย: เก็บชื่อผู้ใช้ใน localStorage และไปที่หน้าแรก
            localStorage.setItem('police_user', u);
            alert('เข้าสู่ระบบสำเร็จ: ' + u);
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
